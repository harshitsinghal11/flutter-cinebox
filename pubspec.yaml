
name: cinebox
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

# Firebase Core & Auth
  firebase_core: ^3.15.2
  firebase_auth: ^5.0.0
  
  # Database (Firestore is best for storing user lists)
  cloud_firestore: ^5.0.0
  
  # Networking (For Movie API)
  http: ^1.2.0
  
  # State Management (Choose one, Provider is simple for starting)
  provider: ^6.1.5+1
  
  # UI Utilities
  cached_network_image: ^3.3.0
  fluttertoast: ^8.2.0
  google_fonts: ^8.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/